<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebGIS 3D Kotagede — Arkeologi Vertikal</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <link rel="stylesheet" href="assets/css/variables.css" />
  <link rel="stylesheet" href="assets/css/layout.css" />
  <link rel="stylesheet" href="assets/css/sidebar.css" />
  <link rel="stylesheet" href="assets/css/map.css" />
  <link rel="stylesheet" href="assets/css/panel.css" />
  <link rel="stylesheet" href="assets/css/drawer.css" />
  <link rel="stylesheet" href="assets/css/responsive.css" />
</head>
<body>
<div class="shell">

  <header class="topbar">
    <div class="brand">
      <div class="brand-icon">▣</div>
      <div>
        <span class="brand-text">Arkeologi Vertikal</span>
        <span class="brand-sub">— WebGIS 3D Kotagede</span>
      </div>
    </div>
    <nav class="topnav">
      <a href="#" class="active">Peta &amp; Model</a>
    </nav>
    <div class="top-meta">SIG Terapan &nbsp;&middot;&nbsp; Kotagede, Yogyakarta</div>
  </header>

  <div class="body">

    <aside class="sidebar">
      <div class="sb-search">
        <input type="text" id="searchInput" placeholder="Cari situs, kawasan, bangunan..." />
        <div id="searchResults" class="search-results"></div>
      </div>

      <div class="sb-head">Lokasi Penting</div>
      <div class="loc-list" id="locList"></div>
    </aside>

    <div class="map-wrap">
      <div id="map"></div>

      <div class="era-bar">
        <div class="era-btns">
          <button class="era-btn active" data-era="1600">Mataram 1600</button>
          <button class="era-btn" data-era="2025">Kotagede 2025</button>
        </div>
        <div class="basemap-label" id="basemapLabel">Basemap: Peta Historis</div>
      </div>

      <div class="time-bar">
        <div class="time-row">
          <span class="time-lbl">Tahun</span>
          <span class="yr-chip" id="yrChip">1600</span>
          <input type="range" id="slider" min="1600" max="2025" value="1600" step="5" />
          <span class="yr-chip">2025</span>
        </div>
        <div class="tick-row">
          <span>1600</span><span>1650</span><span>1700</span><span>1750</span>
          <span>1800</span><span>1850</span><span>1900</span><span>1950</span><span>2025</span>
        </div>
      </div>
    </div>

    <aside class="right-panel" id="rightPanel">
      <div id="emptyState" class="empty-state">
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:32px 20px;text-align:center;height:100%">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" style="opacity:0.2">
            <rect x="3" y="8" width="42" height="32" rx="3" stroke="#2d5a0e" stroke-width="2"/>
            <path d="M3 19L15 13L27 21L39 11L45 14" stroke="#2d5a0e" stroke-width="1.5" stroke-linejoin="round"/>
            <circle cx="15" cy="13" r="2.5" fill="#2d5a0e"/>
            <circle cx="27" cy="21" r="2.5" fill="#2d5a0e"/>
            <circle cx="39" cy="11" r="2.5" fill="#2d5a0e"/>
          </svg>
          <p style="font-size:12px;color:var(--faint);line-height:1.65;max-width:160px">Pilih lokasi di panel kiri atau klik marker di peta untuk melihat model 3D dan detail situs.</p>
        </div>
      </div>
    </aside>

  </div>
</div>

<script type="module" src="assets/main.js"></script>
</body>
</html>
